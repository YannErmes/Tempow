user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript text/xml 
               application/x-javascript application/xml+rss 
               application/json application/javascript image/svg+xml;
    gzip_disable "msie6";
    gzip_vary on;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=download:10m rate=5r/s;

    # ──────────────────────────────────────────────────────────────
    # HTTP Server (redirect to HTTPS in production)
    # ──────────────────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Certbot challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect to HTTPS (uncomment in production)
        # location / {
        #     return 301 https://$host$request_uri;
        # }

        # Direct HTTP for development (comment out in production)
        location / {
            proxy_pass http://tempow:80;
            include /etc/nginx/proxy_params.conf;
        }
    }

    # ──────────────────────────────────────────────────────────────
    # HTTPS Server (production)
    # ──────────────────────────────────────────────────────────────
    # Uncomment and configure in production with Let's Encrypt
    #
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 60m;
    #
    #     add_header Strict-Transport-Security "max-age=31536000" always;
    #     add_header X-Frame-Options "SAMEORIGIN" always;
    #     add_header X-Content-Type-Options "nosniff" always;
    #     add_header Referrer-Policy "no-referrer-when-downgrade" always;
    #
    #     location / {
    #         # See main server block configuration below
    #     }
    # }

    # ──────────────────────────────────────────────────────────────
    # Main Tempow Server Block
    # ──────────────────────────────────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name localhost 127.0.0.1;

        root /usr/share/nginx/html;
        index index.html;

        # ── Security Headers ──────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # ── Service Worker Scope ──────────────────────────────────
        location = /service-worker.js {
            add_header Service-Worker-Allowed "/";
            add_header Cache-Control "public, max-age=3600";
            add_header Content-Type "application/javascript";
        }

        # ── Manifest File ─────────────────────────────────────────
        location = /manifest.json {
            add_header Content-Type "application/json";
            add_header Cache-Control "public, max-age=3600";
        }

        # ── HTML: Cache for 1 hour ────────────────────────────────
        location ~ \.html?$ {
            add_header Cache-Control "public, max-age=3600";
            add_header X-Content-Type-Options "nosniff" always;
            try_files $uri $uri/ /index.html;
        }

        # ── Static Assets: Long-term cache ────────────────────────
        location ~ \.(css|js|svg|png|jpg|jpeg|gif|ico|woff|woff2|ttf|eot)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            expires 365d;
            access_log off;
        }

        # ── JSON: 1 hour cache ────────────────────────────────────
        location ~ \.json$ {
            add_header Cache-Control "public, max-age=3600";
            add_header Content-Type "application/json";
        }

        # ── API/Data endpoints: Rate limited ──────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params.conf;
        }

        # ── Downloads: Rate limited ───────────────────────────────
        location ~ /download/ {
            limit_req zone=download burst=10 nodelay;
            add_header Content-Disposition "attachment"; 
        }

        # ── Proxy everything else to main app ──────────────────────
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "public, max-age=3600";
        }

        # ── Deny access to sensitive files ─────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── Error pages ───────────────────────────────────────────
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # ── Upstream backend (if needed for API) ──────────────────────
    # upstream backend {
    #     server api:3000;
    # }
}
